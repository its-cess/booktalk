name: CI

on:
  pull_request:
    branches: [main]

jobs:
  setup:
    name: Install & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build shared package
        run: pnpm --filter @booktalk/shared build

      - name: Cache build artifacts
        uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            apps/web/node_modules
            apps/api/node_modules
            packages/shared/node_modules
            packages/shared/dist
          key: build-${{ github.sha }}

  lint:
    name: Lint
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Restore build artifacts
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/web/node_modules
            apps/api/node_modules
            packages/shared/node_modules
            packages/shared/dist
          key: build-${{ github.sha }}

      - name: Lint
        run: pnpm --filter web lint

  typecheck:
    name: Typecheck
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Restore build artifacts
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/web/node_modules
            apps/api/node_modules
            packages/shared/node_modules
            packages/shared/dist
          key: build-${{ github.sha }}

      # Full production build (tsc -b + vite build) — matches the Cloudflare
      # Pages build, so type errors in test files (noUnusedLocals) and build
      # failures are caught on the PR instead of at deploy time.
      - name: Build web
        run: pnpm --filter web build

  unit-tests:
    name: Unit Tests
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Restore build artifacts
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/web/node_modules
            apps/api/node_modules
            packages/shared/node_modules
            packages/shared/dist
          key: build-${{ github.sha }}

      - name: Unit Tests
        run: pnpm --filter web test
